services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vms-frontend-dev
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:3001}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - vms-network

networks:
  vms-network:
    driver: bridge
